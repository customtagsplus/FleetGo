<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FleetManager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #ffffff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-64 glass p-6 border-r border-white/10">
        <h1 class="text-xl font-bold text-yellow-500 mb-10">FleetManager Pro</h1>
        <nav class="space-y-4">
            <button onclick="show('truck-roster')" class="block w-full p-3 hover:bg-white/10 rounded border-l-4 border-transparent hover:border-yellow-500 transition">TRUCK ROSTER</button>
            <button onclick="show('trip-entry')" class="block w-full p-3 hover:bg-white/10 rounded border-l-4 border-yellow-500 transition">TRIP ENTRY</button>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-auto">
        <section id="trip-entry" class="glass p-8 rounded-xl max-w-2xl">
            <h2 class="text-2xl font-semibold mb-6">Log New Trip</h2>
            <form id="tripForm" class="grid grid-cols-2 gap-6">
                <input type="text" id="driver" class="bg-black/50 p-3 rounded border border-white/10" readonly placeholder="Driver Name">
                <input type="date" id="tripDate" class="bg-black/50 p-3 rounded border border-white/10">
                
                <select id="truckSelect" class="bg-black/50 p-3 rounded border border-white/10 col-span-2" onchange="autoFillOdo()">
                    <option value="">-- Select Truck --</option>
                </select>

                <input type="number" id="beginOdo" class="bg-black/50 p-3 rounded border border-white/10" readonly placeholder="Begin Odometer">
                <input type="number" id="endOdo" class="bg-black/50 p-3 rounded border border-white/10" placeholder="End Odometer" oninput="calculate()">
                
                <input type="number" id="totalMiles" class="bg-black/50 p-3 rounded border border-white/10" readonly placeholder="Total Miles">
                <input type="number" id="sdMiles" class="bg-black/50 p-3 rounded border border-white/10" readonly placeholder="SD Miles">
            </form>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
